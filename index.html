<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg:#0e0e0f;
--surface:#161618;
--border:#2a2a2e;
--accent:#e8c97e;
--accent2:#c47f4b;
--text:#f0ede8;
--text-muted:#7a7872;
--user-bg:#1e1c19;
--assistant-bg:#13131a;
--radius:16px;
}

body{
font-family:'DM Mono', monospace;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 28px;
border-bottom:1px solid var(--border);
background:var(--surface);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-mark{
width:32px;
height:32px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:500;
color:#0e0e0f;
}

.logo-text{
font-family:'DM Serif Display', serif;
font-size:20px;
color:var(--accent);
}

.model-badge{
font-size:10px;
color:var(--text-muted);
border:1px solid var(--border);
padding:4px 10px;
border-radius:20px;
}

.clear-btn{
background:none;
border:1px solid var(--border);
color:var(--text-muted);
padding:6px 14px;
border-radius:8px;
cursor:pointer;
}

#messages{
flex:1;
overflow-y:auto;
padding:32px 0;
display:flex;
flex-direction:column;
gap:4px;
}

.msg-wrap{
display:flex;
padding:6px 28px;
}

.msg-wrap.user{justify-content:flex-end;}
.msg-wrap.assistant{justify-content:flex-start;}

.bubble{
max-width:80%;
padding:14px 18px;
border-radius:16px;
font-size:13.5px;
line-height:1.6;
white-space:pre-wrap;
}

.user .bubble{
background:var(--user-bg);
border:1px solid #2d2b26;
}

.assistant .bubble{
background:var(--assistant-bg);
border:1px solid var(--border);
}

.empty-state{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:16px;
color:var(--text-muted);
text-align:center;
}

.empty-state h2{
font-family:'DM Serif Display', serif;
font-size:36px;
color:var(--text);
}

.suggestions{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

.suggestion{
background:var(--surface);
border:1px solid var(--border);
padding:8px 16px;
border-radius:20px;
font-size:12px;
cursor:pointer;
}

.input-area{
padding:20px 28px 24px;
border-top:1px solid var(--border);
background:var(--surface);
}

.input-row{
display:flex;
gap:12px;
background:var(--bg);
border:1px solid var(--border);
border-radius:16px;
padding:12px 16px;
}

#userInput{
flex:1;
background:none;
border:none;
outline:none;
color:var(--text);
font-family:'DM Mono', monospace;
font-size:13.5px;
resize:none;
}

#userInput::placeholder{color:var(--text-muted);}

#sendBtn{
background:linear-gradient(135deg,var(--accent),var(--accent2));
border:none;
width:36px;
height:36px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.error-msg{
background:#2a1a1a;
border:1px solid #4a2020;
color:#e08080;
padding:12px 18px;
border-radius:12px;
font-size:12px;
margin:0 28px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<div class="logo-mark">C</div>
<span class="logo-text">ChatGPT</span>
</div>
<div class="model-badge">gpt-4o-mini</div>
<button class="clear-btn" onclick="clearChat()">Clear chat</button>
</header>

<div id="messages">
<div class="empty-state" id="emptyState">
<h2>Ask ChatGPT anything.</h2>
<p>I'm ChatGPT, an AI assistant made by OpenAI. Start a conversation below.</p>

<div class="suggestions">
<div class="suggestion" onclick="suggest(this)">Help me study for a test</div>
<div class="suggestion" onclick="suggest(this)">Explain something complex simply</div>
<div class="suggestion" onclick="suggest(this)">Write a short story</div>
<div class="suggestion" onclick="suggest(this)">Debug my code</div>
<div class="suggestion" onclick="suggest(this)">Give me a fun fact</div>
</div>

</div>
</div>

<div class="input-area">
<div class="input-row">
<textarea id="userInput" placeholder="Message ChatGPT..." rows="1" onkeydown="handleKey(event)"></textarea>

<button id="sendBtn" onclick="sendMessage()">
➤
</button>
</div>
</div>

<script>

const API_URL="https://api.openai.com/v1/chat/completions";
const API_KEY="YOUR_API_KEY_HERE";sk-abcdef1234567890abcdef1234567890abcdef12

let conversationHistory=[];

const messagesEl=document.getElementById("messages");
const inputEl=document.getElementById("userInput");

function handleKey(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
}

function suggest(el){
inputEl.value=el.textContent;
sendMessage();
}

function addMessage(role,text){

document.getElementById("emptyState")?.remove();

const wrap=document.createElement("div");
wrap.className=`msg-wrap ${role}`;

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.textContent=text;

wrap.appendChild(bubble);
messagesEl.appendChild(wrap);

messagesEl.scrollTop=messagesEl.scrollHeight;
}

async function sendMessage(){

const text=inputEl.value.trim();
if(!text) return;

inputEl.value="";

addMessage("user",text);
conversationHistory.push({role:"user",content:text});

try{

const resp=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:conversationHistory
})
});

const data=await resp.json();

const reply=data.choices?.[0]?.message?.content || "No response";

addMessage("assistant",reply);
conversationHistory.push({role:"assistant",content:reply});

}catch(e){

const err=document.createElement("div");
err.className="error-msg";
err.textContent="Error connecting to API";
messagesEl.appendChild(err);

}

}

function clearChat(){
conversationHistory=[];
messagesEl.innerHTML=`
<div class="empty-state" id="emptyState">
<h2>Ask ChatGPT anything.</h2>
<p>I'm ChatGPT, an AI assistant made by OpenAI. Start a conversation below.</p>
</div>`;
}

</script>

</body>
</html>
