<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --accent: #e8c97e;
    --accent2: #c47f4b;
    --text: #f0ede8;
    --text-muted: #7a7872;
    --user-bg: #1e1c19;
    --claude-bg: #13131a;
    --radius: 16px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: #0e0e0f;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  .model-badge {
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
    position: relative;
    z-index: 1;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-wrap {
    display: flex;
    padding: 6px 28px;
    animation: fadeSlide 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes fadeSlide {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user { justify-content: flex-end; }
  .msg-wrap.assistant { justify-content: flex-start; }

  .bubble {
    max-width: min(680px, 80%);
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: 13.5px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .user .bubble {
    background: var(--user-bg);
    border: 1px solid #2d2b26;
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .assistant .bubble {
    background: var(--claude-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    position: relative;
  }

  .assistant .bubble::before {
    content: 'C';
    position: absolute;
    left: -32px;
    top: 12px;
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #0e0e0f;
    flex-shrink: 0;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 16px 18px;
    background: var(--claude-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
    opacity: 0.6;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
    padding: 40px;
    text-align: center;
  }

  .empty-state h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--text);
    font-weight: 400;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 320px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 560px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
  }
  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .input-area {
    position: relative;
    z-index: 10;
    padding: 20px 28px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent2);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    min-height: 24px;
  }

  #userInput::placeholder { color: var(--text-muted); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #0e0e0f;
  }

  #sendBtn:hover { transform: scale(1.05); opacity: 0.9; }
  #sendBtn:active { transform: scale(0.97); }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  #sendBtn svg { width: 16px; height: 16px; }

  .error-msg {
    background: #2a1a1a;
    border: 1px solid #4a2020;
    color: #e08080;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 12px;
    margin: 0 28px;
  }

  /* Code blocks in responses */
  .bubble code {
    background: #1a1a22;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">C</div>
    <span class="logo-text">Claude</span>
  </div>
  <div class="model-badge">claude-sonnet-4-6</div>
  <button class="clear-btn" onclick="clearChat()">Clear chat</button>
</header>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <h2>Ask me anything.</h2>
    <p>I'm Claude, an AI assistant made by Anthropic. Start a conversation below.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest(this)">Help me study for a test</div>
      <div class="suggestion" onclick="suggest(this)">Explain something complex simply</div>
      <div class="suggestion" onclick="suggest(this)">Write a short story</div>
      <div class="suggestion" onclick="suggest(this)">Debug my code</div>
      <div class="suggestion" onclick="suggest(this)">Give me a fun fact</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="Message Claude..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_URL = "https://api.anthropic.com/v1/messages";
  let conversationHistory = [];
  let isStreaming = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    autoResize(inputEl);
    sendMessage();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    if (emptyState) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap assistant';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function showError(msg) {
    removeTyping();
    const err = document.createElement('div');
    err.className = 'error-msg';
    err.textContent = '⚠ ' + msg;
    messagesEl.appendChild(err);
    scrollToBottom();
    setTimeout(() => err.remove(), 6000);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: conversationHistory
        })
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showError(err?.error?.message || `API error (${resp.status})`);
        conversationHistory.pop();
      } else {
        const data = await resp.json();
        const reply = data.content?.[0]?.text || '';
        addMessage('assistant', reply);
        conversationHistory.push({ role: 'assistant', content: reply });
      }
    } catch (e) {
      removeTyping();
      showError('Network error — check your connection and try again.');
      conversationHistory.pop();
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    conversationHistory = [];
    messagesEl.innerHTML = `
      <div class="empty-state" id="emptyState">
        <h2>Ask me anything.</h2>
        <p>I'm Claude, an AI assistant made by Anthropic. Start a conversation below.</p>
        <div class="suggestions">
          <div class="suggestion" onclick="suggest(this)">Help me study for a test</div>
          <div class="suggestion" onclick="suggest(this)">Explain something complex simply</div>
          <div class="suggestion" onclick="suggest(this)">Write a short story</div>
          <div class="suggestion" onclick="suggest(this)">Debug my code</div>
          <div class="suggestion" onclick="suggest(this)">Give me a fun fact</div>
        </div>
      </div>`;
  }

  inputEl.focus();
</script>
</body>
</html>
